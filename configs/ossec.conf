<!--
    CyberForge - Wazuh Agent Configuration (ossec.conf)
    Author: KAOUANE WALID

    Deploy this on the Windows Server (Wazuh Agent).
    Place at: C:\Program Files (x86)\ossec-agent\ossec.conf
-->

<ossec_config>

  <!-- ============================================
       MANAGER CONNECTION
       ============================================ -->
  <client>
    <server>
      <address>WAZUH_MANAGER_IP</address>
      <port>1514</port>
      <protocol>tcp</protocol>
    </server>
    <config-profile>windows</config-profile>
    <notify_time>10</notify_time>
    <time-reconnect>60</time-reconnect>
    <auto_restart>yes</auto_restart>
  </client>

  <!-- ============================================
       FILE INTEGRITY MONITORING (FIM)
       Scenario 3: Malware Detection
       ============================================ -->
  <syscheck>
    <frequency>300</frequency>
    <scan_on_start>yes</scan_on_start>

    <!-- Monitor download folders and temp directories in real-time -->
    <directories check_all="yes" realtime="yes" report_changes="yes">
      C:\Users\Public\Downloads
    </directories>
    <directories check_all="yes" realtime="yes" report_changes="yes">
      C:\Temp
    </directories>
    <directories check_all="yes" realtime="yes" report_changes="yes">
      C:\Users\Administrator\Desktop
    </directories>

    <!-- Ignore common noisy paths -->
    <ignore>C:\Windows\SoftwareDistribution</ignore>
    <ignore>C:\Windows\Prefetch</ignore>
    <ignore type="sregex">.log$|.tmp$|.cache$</ignore>
  </syscheck>

  <!-- ============================================
       LOG COLLECTION
       ============================================ -->
  <localfile>
    <log_format>eventlog</log_format>
    <location>Security</location>
  </localfile>

  <localfile>
    <log_format>eventlog</log_format>
    <location>System</location>
  </localfile>

  <localfile>
    <log_format>eventlog</log_format>
    <location>Application</location>
  </localfile>

  <!-- Collect Windows Defender logs -->
  <localfile>
    <log_format>eventchannel</log_format>
    <location>Microsoft-Windows-Windows Defender/Operational</location>
  </localfile>

  <!-- Collect RDP / Terminal Services logs -->
  <localfile>
    <log_format>eventchannel</log_format>
    <location>Microsoft-Windows-TerminalServices-RemoteConnectionManager/Operational</location>
  </localfile>

  <!-- ============================================
       ACTIVE RESPONSE
       Scenario 2: RDP Brute Force IP Block
       ============================================ -->
  <active-response>
    <disabled>no</disabled>
  </active-response>

</ossec_config>
