<!--
    CyberForge - Wazuh Manager Configuration
    Author: KAOUANE WALID

    Key sections: VirusTotal integration, Active Response, Suricata log ingestion.
    Deploy on the Wazuh Manager (Ubuntu 22.04).
    Place at: /var/ossec/etc/ossec.conf
-->

<ossec_config>

  <!-- ============================================
       GLOBAL SETTINGS
       ============================================ -->
  <global>
    <jsonout_output>yes</jsonout_output>
    <alerts_log>yes</alerts_log>
    <logall>no</logall>
    <logall_json>no</logall_json>
    <email_notification>no</email_notification>
    <smtp_server>smtp.example.wlab.local</smtp_server>
    <email_from>wazuh@wlab.local</email_from>
    <email_to>admin@wlab.local</email_to>
    <email_maxperhour>12</email_maxperhour>
  </global>

  <!-- ============================================
       ALERTS LEVEL
       ============================================ -->
  <alerts>
    <log_alert_level>3</log_alert_level>
    <email_alert_level>12</email_alert_level>
  </alerts>

  <!-- ============================================
       VIRUSTOTAL INTEGRATION
       Scenario 3: Malware Detection
       ============================================ -->
  <integration>
    <name>virustotal</name>
    <api_key>YOUR_VIRUSTOTAL_API_KEY_HERE</api_key>
    <!-- Trigger on FIM events (new/modified files) -->
    <rule_id>550,554</rule_id>
    <alert_format>json</alert_format>
  </integration>

  <!-- ============================================
       ACTIVE RESPONSE — IP BLOCK
       Scenario 2: RDP Brute Force
       ============================================ -->
  <command>
    <name>firewall-drop</name>
    <executable>firewall-drop.cmd</executable>
    <expect>srcip</expect>
    <timeout_allowed>yes</timeout_allowed>
  </command>

  <active-response>
    <!-- Block attacker IP when RDP brute force rule fires (60204) -->
    <command>firewall-drop</command>
    <location>local</location>
    <rules_id>60204</rules_id>
    <timeout>600</timeout>
  </active-response>

  <!-- ============================================
       ACTIVE RESPONSE — MALWARE REMOVAL
       Scenario 3: Auto-delete detected malware
       ============================================ -->
  <command>
    <name>delete-malware</name>
    <executable>delete_malware.exe</executable>
    <expect>filename</expect>
    <timeout_allowed>no</timeout_allowed>
  </command>

  <active-response>
    <command>delete-malware</command>
    <location>local</location>
    <!-- VirusTotal high-confidence malicious verdict -->
    <rules_id>87105</rules_id>
    <timeout>0</timeout>
  </active-response>

  <!-- ============================================
       SURICATA LOG INGESTION
       Scenario 1: Network Reconnaissance
       ============================================ -->
  <localfile>
    <log_format>json</log_format>
    <location>/var/log/suricata/eve.json</location>
  </localfile>

  <!-- ============================================
       AGENT MANAGER
       ============================================ -->
  <remote>
    <connection>secure</connection>
    <port>1514</port>
    <protocol>tcp</protocol>
    <queue_size>131072</queue_size>
  </remote>

  <!-- ============================================
       ROOTCHECK
       ============================================ -->
  <rootcheck>
    <disabled>no</disabled>
    <check_files>yes</check_files>
    <check_trojans>yes</check_trojans>
    <check_dev>yes</check_dev>
    <check_sys>yes</check_sys>
    <check_pids>yes</check_pids>
    <check_ports>yes</check_ports>
    <check_if>yes</check_if>
    <frequency>43200</frequency>
  </rootcheck>

</ossec_config>
